<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - Success</title>
    
    <link rel="stylesheet" href="styles/globals.css">
    <link rel="stylesheet" href="styles/components.css">
    <link rel="stylesheet" href="styles/responsive.css">
</head>
<body>
    <div id="root">
        <nav class="navbar">
            <div class="navbar__container">
                <div class="navbar__logo">
                    <h1>Success</h1>
                </div>
            </div>
        </nav>

        <main class="main-content">
            <div class="container">
                <section class="form-section">
                    <div class="form-card">
                        <h2 class="form-card__title">Crear Cuenta</h2>
                        <p class="form-card__subtitle">Comienza tu viaje hacia el éxito</p>

                        <form class="form" id="registerForm">
                            <div class="form-group">
                                <label for="name">Nombre Completo</label>
                                <input type="text" id="name" name="name" placeholder="Juan Pérez" required>
                            </div>

                            <div class="form-group">
                                <label for="email">Correo Electrónico</label>
                                <input type="email" id="email" name="email" placeholder="tu@email.com" required>
                            </div>

                            <div class="form-group">
                                <label for="password">Contraseña</label>
                                <input type="password" id="password" name="password" placeholder="••••••••" required>
                                <small style="color: var(--color-gray); margin-top: 4px;">Mínimo 8 caracteres</small>
                            </div>

                            <div class="form-group">
                                <label for="confirPassword">Confirmar Contraseña</label>
                                <input type="password" id="confirPassword" name="confirPassword" placeholder="••••••••" required>
                            </div>

                            <div class="form-group">
                                <label class="checkbox">
                                    <input type="checkbox" name="agree" required>
                                    <span>Acepto los términos y condiciones</span>
                                </label>
                            </div>

                            <button type="submit" class="btn btn--primary btn--block">Crear Cuenta</button>
                        </form>

                        <div class="divider">O</div>

                        <div class="oauth-buttons">
                            <button class="btn btn--outline btn--block">
                                🔵 Google
                            </button>
                            <button class="btn btn--outline btn--block">
                                ⬛ GitHub
                            </button>
                        </div>

                        <div class="form-footer">
                            <p>¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a></p>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <style>
        .form-section {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 70px);
        }

        .form-card {
            background-color: #fff;
            border-radius: 12px;
            padding: var(--space-lg);
            max-width: 400px;
            width: 100%;
            box-shadow: var(--shadow-md);
        }

        .form-card__title {
            text-align: center;
            margin-bottom: var(--space-sm);
        }

        .form-card__subtitle {
            text-align: center;
            color: var(--color-gray);
            margin-bottom: var(--space-lg);
        }

        .divider {
            text-align: center;
            margin: var(--space-xl) 0;
            color: var(--color-gray);
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 40%;
            height: 1px;
            background-color: #d1d5db;
        }

        .divider::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            width: 40%;
            height: 1px;
            background-color: #d1d5db;
        }

        .oauth-buttons {
            display: flex;
            flex-direction: column;
            gap: var(--space-md);
            margin-bottom: var(--space-lg);
        }

        .form-footer {
            text-align: center;
            font-size: 0.875rem;
            color: var(--color-gray);
        }

        .form-footer p {
            margin-bottom: var(--space-sm);
        }

        .form-footer a {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 500;
        }

        .form-footer a:hover {
            text-decoration: underline;
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            cursor: pointer;
            font-weight: normal;
        }

        .checkbox input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }
    </style>
</body>
</html>
